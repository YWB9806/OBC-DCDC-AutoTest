name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Create ZIP archive
        run: |
          cd dist
          Compress-Archive -Path OBC-DCDC-AutoTest -DestinationPath OBC-DCDC-AutoTest-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/OBC-DCDC-AutoTest-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libegl1 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Create TAR archive
        run: |
          cd dist
          tar -czf OBC-DCDC-AutoTest-Linux.tar.gz OBC-DCDC-AutoTest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/OBC-DCDC-AutoTest-Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Create archive
        run: |
          cd dist
          tar -czf OBC-DCDC-AutoTest-macOS.tar.gz OBC-DCDC-AutoTest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/OBC-DCDC-AutoTest-macOS.tar.gz

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: OBC-DCDC AutoTest ${{ steps.get_version.outputs.version }}
          body: |
            ## OBC-DCDC AutoTest ${{ steps.get_version.outputs.version }}

            ### 下载

            请根据您的操作系统选择对应的安装包：

            | 平台 | 文件 |
            |------|------|
            | Windows | `OBC-DCDC-AutoTest-Windows.zip` |
            | Linux | `OBC-DCDC-AutoTest-Linux.tar.gz` |
            | macOS | `OBC-DCDC-AutoTest-macOS.tar.gz` |

            ### 安装说明

            **Windows**
            1. 下载 `OBC-DCDC-AutoTest-Windows.zip`
            2. 解压到任意目录
            3. 双击 `OBC-DCDC-AutoTest.exe` 运行

            **Linux**
            1. 下载 `OBC-DCDC-AutoTest-Linux.tar.gz`
            2. 解压: `tar -xzf OBC-DCDC-AutoTest-Linux.tar.gz`
            3. 运行: `./OBC-DCDC-AutoTest/OBC-DCDC-AutoTest`

            **macOS**
            1. 下载 `OBC-DCDC-AutoTest-macOS.tar.gz`
            2. 解压: `tar -xzf OBC-DCDC-AutoTest-macOS.tar.gz`
            3. 首次运行可能需要在系统设置中允许

            详细更新内容请查看 [CHANGELOG.md](CHANGELOG.md)。

            问题反馈: [Issues](https://github.com/YWB9806/OBC-DCDC-AutoTest/issues)
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'alpha') }}
          files: |
            artifacts/windows-build/OBC-DCDC-AutoTest-Windows.zip
            artifacts/linux-build/OBC-DCDC-AutoTest-Linux.tar.gz
            artifacts/macos-build/OBC-DCDC-AutoTest-macOS.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
